<!doctype html>
<html lang="zh-CN" style="background-color: transparent;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>珊瑚音乐桌面歌词</title>
  </head>
  <body style="background-color: transparent;">
    <div id="root"></div>
    <script>
      const formatLang = (lang = 'en') => {
        if (lang === 'zh-cn') return 'zh-Hans'
        if (lang === 'zh-tw') return 'zh-Hant'
        return lang.split('-')[0]
      }
      const resolveOS = () => {
        const match = /os=(\w+)/.exec(window.location.search)
        if (match) return match[1]
        if (/win/i.test(navigator.platform)) return 'windows'
        if (/mac/i.test(navigator.platform)) return 'mac'
        return 'linux'
      }

      window.setLang = (lang = navigator.language.toLocaleLowerCase()) => {
        document.documentElement.setAttribute('lang', formatLang(lang))
      }
      window.setLang()
      window.os = resolveOS()
      document.documentElement.classList.add(window.os)

      window.dom_style_theme = document.createElement('style')
      window.dom_style_lyric = document.createElement('style')
      window.setTheme = colors => {
        window.dom_style_theme.innerText = `:root {${Object.entries(colors).map(([key, value]) => `${key}:${value};`).join('')}}`
      }
      window.setLyricColor = colors => {
        window.dom_style_lyric.innerText = `:root {${Object.entries(colors).map(([key, value]) => `${key}:${value};`).join('')}}`
      }
      document.body.appendChild(window.dom_style_theme)
      document.body.appendChild(window.dom_style_lyric)

      const applyThemeColor = theme => {
        const parsedTheme = JSON.parse(decodeURIComponent(theme))
        window.setTheme(parsedTheme.colors)
      }
      if (/theme=(.+)(#|$)/.test(window.location.search)) applyThemeColor(RegExp.$1)
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
